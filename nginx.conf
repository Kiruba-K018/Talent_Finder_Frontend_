events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # DNS resolver for Cloud Run domains
    resolver 8.8.8.8 8.8.4.4 valid=10s;
    resolver_timeout 5s;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Increase proxy buffer sizes for large response headers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Frontend server
    server {
        listen 8080;
        server_name _;

        # Serve static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy requests to backend core service (/api/v1/*)
        location /api/v1/ {
            proxy_pass https://talentfinder-backend-core-717740758627.us-east1.run.app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host talentfinder-backend-core-717740758627.us-east1.run.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Proxy requests to backend sourcing service (/sourcing/*)
        location /sourcing/ {
            proxy_pass https://talentfinder-backend-sourcing-717740758627.us-east1.run.app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host talentfinder-backend-sourcing-717740758627.us-east1.run.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Error pages
        error_page 404 /index.html;
    }
}