<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="url(#grad)" rx="25"/>
  
  <!-- People icon representing talents/recruiters -->
  <g transform="translate(90, 90)">
    <!-- Left person circle -->
    <circle cx="-25" cy="-20" r="18" fill="white" opacity="0.9"/>
    <!-- Left person body -->
    <path d="M -42 15 Q -42 5 -25 5 Q -8 5 -8 15 L -8 35 Q -8 40 -12 40 L -38 40 Q -42 40 -42 35 Z" fill="white" opacity="0.9"/>
    
    <!-- Right person circle -->
    <circle cx="25" cy="-20" r="18" fill="white" opacity="0.85"/>
    <!-- Right person body -->
    <path d="M 8 15 Q 8 5 25 5 Q 42 5 42 15 L 42 35 Q 42 40 38 40 L 12 40 Q 8 40 8 35 Z" fill="white" opacity="0.85"/>
    
    <!-- Center person (larger) -->
    <circle cx="0" cy="5" r="20" fill="white"/>
    <!-- Center person body -->
    <path d="M -20 30 Q -20 18 0 18 Q 20 18 20 30 L 20 45 Q 20 50 15 50 L -15 50 Q -20 50 -20 45 Z" fill="white"/>
  </g>
</svg>